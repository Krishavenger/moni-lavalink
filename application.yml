server:
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    # Updated to the latest stable version suggested by your server logs
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false # Keep native disabled as plugin handles it
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000

plugins:
  youtube:
    enabled: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Forcing modern native playback signatures to fully bypass the base.js error
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEB_REMIX
      - TVHTML5_SIMPLY_EMBEDDED_PLAYER

metrics:
  prometheus:
    enabled: false
logging:
  level:
    root: INFO
    lavalink: INFO
