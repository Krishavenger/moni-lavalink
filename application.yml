server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000

plugins:
  youtube:
    enabled: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Sirf wahi clients hain jo data-center IPs par block ya captcha nahi maangte
    clients:
      - MUSIC
      - ANDROID_MUSIC
      - TVHTML5_SIMPLY_EMBEDDED_PLAYER
    # Future-proofing against rate limits and bot detection
    pot:
      token: "dummy"
    oauth:
      enabled: false

metrics:
  prometheus:
    enabled: false

logging:
  level:
    root: INFO
    lavalink: INFO
